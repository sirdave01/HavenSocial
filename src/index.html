<!doctype html>
<html lang="en" data-theme="light">
  <!--default theme to be toggled by JS-->

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Basic SEO -->
    <title>HavenSocial</title>

    <meta
      name="description"
      content="HavenSocial: A lightweight social platform for sharing connects, location discovery, and interactions. Powered by havenbyte Token (HBT)."
    />

    <meta name="author" content="Osigwe Uchechukwu DavidCaleb" />

    <meta
      name="keywords"
      content="HavenSocial, social media app Nigeria, location-based posts, ByteHaven Tech Solutions, havenbyte token, HBT, social networking, nearby discovery, user interactions"
    />

    <!-- Favicon  -->

    <link
      rel="android-chrome-192x192"
      href="images/favicon/android-chrome-192x192.png"
    />

    <link rel="apple-touch-icon" href="images/favicon/apple-touch-icon.png" />

    <link
      rel="android-chrome-512x512"
      href="images/favicon/android-chrome-512x512.png"
    />

    <link rel="favicon-16x16" href="images/favicon/favicon-16x16.png" />

    <link rel="favicon-32x32" href="images/favicon/favicon-32x32.png" />

    <link rel="manifest" href="images/favicon/site.webmanifest" />

    <link rel="icon" href="images/favicon/favicon.ico" />

    <!-- Open Graph / Facebook / LinkedIn -->

    <meta
      property="og:title"
      content="HavenSocial by ByteHaven Tech Solutions Ltd"
    />

    <meta
      property="og:description"
      content="Dynamic social app for posts, likes, comments, and nearby discovery."
    />

    <meta property="og:type" content="webapp" />

    <meta property="og:url" content="https://miniconnect-yvwq.onrender.com" />

    <meta
      property="og:image"
      content="https://sirdave01.github.io/wdd330/finalproject/favicon/apple-touch-icon.png"
    />

    <meta property="og:image:width" content="180" />

    <meta property="og:image:height" content="180" />

    <meta property="og:image:alt" content="ByteHaven Tech Solutions Ltd Logo" />

    <meta property="og:locale" content="en_US" />

    <meta property="og:site_name" content="ByteHaven Tech Solutions Ltd" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="HavenSocial by ByteHaven Tech Solutions Ltd"
    />

    <meta
      name="twitter:description"
      content="Dynamic social app for posts, likes, comments, and nearby discovery."
    />

    <meta
      name="twitter:image"
      content="https://sirdave01.github.io/wdd231/finalproject/favicon/apple-touch-icon.png"
    />

    <meta name="twitter:image:alt" content="ByteHaven circular logo" />

    <meta name="twitter:site" content="@OsigweD13822" />

    <meta name="twitter:creator" content="@OsigweD13822" />

    <link rel="stylesheet" href="/styles/base.css" />

    <script type="module" src="/js/main.mjs"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header>

      <h1>HavenSocial</h1>

      <div>

        <button id="dark-mode-toggle">🌙</button>

        <button id="nav-btn" class="hamburger"></button>

        <!-- <div id="notifications-dropdown" class="hidden"></div> -->

      </div>

    </header>

    <nav id="main-nav">
      <!-- Bottom tab bar for mobile -->
      <div id="tab-bar">
        <a data-view="home" aria-label="Home"
          >🏠<span class="tab-label">Home</span></a
        >

        <a data-view="search" aria-label="Search"
          >🔍<span class="tab-label">Search</span></a
        >

        <a data-view="new-post" aria-label="New Post"
          >✚<span class="tab-label">New Post</span></a
        >

        <a data-view="messages" aria-label="Messages">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            fill="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              d="M20 4H4C2.9 4 2.01 4.9 2.01 6L2 18C2 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V6C22 4.9 21.1 4 20 4ZM20 8L12 13L4 8V6L12 11L20 6V8Z"
            />
          </svg>
          <span class="tab-label">Messages</span>
        </a>

        <button id="notifications-bell">
          🔔 <span id="notif-count">0</span>
        </button>

        <a data-view="profile" aria-label="Profile"
          >👤<span class="tab-label">Profile</span></a
        >
      </div>

      <!-- Hamburger menu for extra options -->

      <div id="nav-list">
        <a data-view="home">🏠 Home</a>
        <a data-view="search">🔍 Search</a>
        <a data-view="new-post">✚ New Post</a>
        <a data-view="messages">✉️ Messages</a>
        <a data-view="profile">👤 Profile</a>
        <a data-view="nearby">📍 Nearby</a>
        <a data-view="settings">⚙️ Settings</a>
      </div>
      
    </nav>

    <main>
      <div id="feed-container">
        <div id="posts-feed"></div>

        <button id="load-more">Load More</button>
      </div>

      <div id="search-container" class="hidden">
        <input
          id="search-input"
          type="text"
          placeholder="Search users or posts..."
        />

        <button class="search-button">Search</button>

        <div id="search-results"></div>
      </div>

      <div id="new-post-container" class="hidden">
        <textarea
          id="post-text"
          maxlength="280"
          placeholder="What's happening?"
        ></textarea>

        <input
          type="url"
          id="post-image-url"
          placeholder="Image URL (optional)"
        />

        <label
          ><input type="checkbox" id="attach-location" checked /> Attach
          location</label
        >

        <button id="submit-post">Post</button>
      </div>

      <div id="profile-container" class="hidden">
        <div id="user-info"></div>

        <div id="user-posts"></div>
      </div>

      <div id="nearby-container" class="hidden">
        <div id="nearby-feed"></div>
      </div>

      <div id="post-detail-container" class="hidden"></div>

      <div id="settings-container" class="hidden">
        <div id="settings-content"></div>
      </div>

      <!-- Messages Container -->
      <div id="messages-container" class="hidden">
        <div id="chats-list" class="chats-list"></div>

        <div id="chat-window" class="chat-window hidden">
          <div id="chat-header" class="chat-header"></div>

          <div id="chat-messages" class="chat-messages"></div>

          <div class="chat-input-area">
            <input
              type="text"
              id="chat-input"
              placeholder="Type a message..."
            />

            <button id="send-message-btn">Send</button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
